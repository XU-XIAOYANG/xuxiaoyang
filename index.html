<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>旅行抓阄 · 去哪儿玩</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #fdf3e7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background-image: radial-gradient(circle at 20% 30%, #ffe8d6 0%, #f8e3cc 80%);
    }
    .container {
      max-width: 420px;
      width: 100%;
      background: rgba(255, 251, 245, 0.9);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: #fff9f2;
      border-radius: 48px;
      box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255,255,255,0.8);
      padding: 30px 24px 38px;
      text-align: center;
      border: 1px solid #fae3cc;
    }
    .subtitle {
      font-size: 15px;
      color: #b4846e;
      letter-spacing: 2px;
      margin-bottom: 6px;
      font-weight: 400;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      color: #5e3e2b;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    h1 span {
      background: #fbe4cf;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 28px;
    }
    .desc {
      color: #9c7a65;
      font-size: 15px;
      margin-bottom: 30px;
      border-bottom: 1px dashed #e7cbb2;
      padding-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .jar-area {
      background: #fae7d6;
      border-radius: 100px;
      padding: 24px 14px 20px;
      margin-bottom: 28px;
      position: relative;
      box-shadow: inset 0 8px 12px rgba(0,0,0,0.05), 0 12px 18px -8px rgba(158, 102, 64, 0.25);
      border: 2px solid #fff3e6;
    }
    .paper-pile {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 80px;
      margin-bottom: 8px;
    }
    .paper-scrap {
      background: #fffef7;
      border-radius: 16px;
      padding: 10px 13px;
      font-size: 14px;
      color: #7b5b47;
      font-weight: 500;
      box-shadow: 2px 4px 10px rgba(0,0,0,0.08), inset 0 -3px 0 rgba(0,0,0,0.02);
      transform: rotate(-1deg);
      transition: all 0.2s;
      border: 1px solid #edd9c6;
      display: inline-block;
    }
    .paper-scrap:nth-child(odd) {
      transform: rotate(2deg);
      background: #fffbf2;
    }
    .result-card {
      background: #fffaf2;
      border-radius: 34px;
      padding: 26px 16px;
      margin: 10px 0 20px;
      border: 2px solid #eaceb0;
      box-shadow: 0 10px 25px rgba(170, 120, 70, 0.2);
      transition: all 0.3s ease;
    }
    .destination {
      font-size: 42px;
      font-weight: 800;
      color: #c45c2c;
      line-height: 1.3;
      letter-spacing: 2px;
      text-shadow: 2px 2px 0 rgba(255,235,200,0.8);
      word-break: break-word;
    }
    .small-hint {
      font-size: 15px;
      color: #b48b6d;
      margin-top: 6px;
    }
    .btn-grab {
      background: #e79b6c;
      border: none;
      border-radius: 60px;
      padding: 18px 32px;
      font-size: 22px;
      font-weight: 700;
      color: white;
      letter-spacing: 3px;
      background: linear-gradient(145deg, #e5975e, #cb7743);
      box-shadow: 0 12px 20px -10px #bc6f43, 0 4px 8px rgba(0,0,0,0.1);
      border: 1px solid #ffccaa;
      transition: all 0.15s ease;
      cursor: pointer;
      width: 80%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-grab:active {
      transform: scale(0.96);
      background: #c36e3b;
      box-shadow: 0 6px 12px rgba(160, 80, 30, 0.4);
    }
    .city-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 20px 0 8px;
      color: #af8b72;
      font-size: 13px;
    }
    .city-badge {
      background: #f7e7da;
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 13px;
      color: #6b4f3c;
    }
    footer {
      margin-top: 22px;
      color: #c8aa8a;
      font-size: 13px;
    }
    @keyframes pop {
      0% { transform: scale(0.9); opacity: 0.6; }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop-effect {
      animation: pop 0.35s ease-out;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="subtitle">✈️ 旅行计划 ✈️</div>
    <h1>
      <span>抓阄</span>去哪儿
    </h1>
    <div class="desc">
      <span>🎋</span> 点击下面，命运帮你选城市 <span>🎋</span>
    </div>

    <!-- 纸团展示区 -->
    <div class="jar-area">
      <div class="paper-pile" id="paperPile">
        <!-- 动态显示几个小纸团 -->
      </div>
      <div style="font-size:13px; color:#b39274; margin-top:4px;">📦 阄罐里有30个城市</div>
    </div>

    <!-- 抓阄结果显示区 -->
    <div id="resultContainer" style="display: none;" class="result-card">
      <div style="font-size:17px; color:#b28056;">🎉 恭喜！抽中 🎉</div>
      <div class="destination" id="cityResult">成都</div>
      <div class="small-hint" id="extraHint">和一起出发吧～</div>
    </div>

    <!-- 初始占位说明 -->
    <div id="placeholderText" style="color:#c7a68b; margin:18px 0; font-size:16px;">
      👆 摇一摇手机或点击按钮
    </div>

    <button class="btn-grab" id="grabBtn">
      <span>🎲</span> 抓 阄 <span>🎲</span>
    </button>

    <div class="city-list">
      <span class="city-badge">北京</span>
      <span class="city-badge">上海</span>
      <span class="city-badge">重庆</span>
      <span class="city-badge">成都</span>
      <span class="city-badge">杭州</span>
      <span class="city-badge">西安</span>
      <span class="city-badge">昆明</span>
      <span class="city-badge">…等30城</span>
    </div>
    <footer>
      🌸 出游季 🌸
    </footer>
  </div>

  <script>
    (function() {
      // 完整的30个城市列表（省会/直辖市 + 旅游城市）
      const cities = [
        "北京", "上海", "天津", "重庆",
        "杭州", "南京", "济南", "合肥", "福州", "南昌",
        "广州", "海口", "南宁",
        "武汉", "长沙", "郑州",
        "石家庄", "太原", "呼和浩特",
        "西安", "兰州", "西宁", "银川", "乌鲁木齐",
        "成都", "昆明", "贵阳", "拉萨",
        "沈阳", "哈尔滨", "长春"
      ];

      // 预设一些纸团显示（随机展示其中几个）
      const paperPile = document.getElementById('paperPile');
      const resultContainer = document.getElementById('resultContainer');
      const cityResult = document.getElementById('cityResult');
      const extraHint = document.getElementById('extraHint');
      const placeholder = document.getElementById('placeholderText');
      const grabBtn = document.getElementById('grabBtn');

      // 初始化纸团展示（随机取6-8个城市展示为小纸团）
      function renderPaperScraps() {
        const shuffled = [...cities].sort(() => Math.random() - 0.5);
        const displayCities = shuffled.slice(0, 8);
        paperPile.innerHTML = displayCities.map(city => 
          `<div class="paper-scrap">📜 ${city}</div>`
        ).join('');
      }
      renderPaperScraps();

      // 随机选择一个城市
      function getRandomCity() {
        const randomIndex = Math.floor(Math.random() * cities.length);
        return cities[randomIndex];
      }

      // 执行抓阄动画和结果显示
      function performGrab() {
        // 轻微滚动效果（纸团抖动）
        const scraps = document.querySelectorAll('.paper-scrap');
        scraps.forEach(el => {
          el.style.transform = `rotate(${Math.random() * 10 - 5}deg) scale(0.95)`;
          setTimeout(() => {
            el.style.transform = '';
          }, 200);
        });

        // 随机结果
        const selectedCity = getRandomCity();

        // 显示结果区域
        resultContainer.style.display = 'block';
        cityResult.textContent = selectedCity;
        // 添加弹出动画
        resultContainer.classList.add('pop-effect');
        setTimeout(() => resultContainer.classList.remove('pop-effect'), 400);

        // 随机一些小提示
        const hints = [
          "团走起！", "马上订机票吧～", "这个城市超美！", "一起喝下午茶吧", 
          "毕业旅行开始！", "妈妈也疯狂！", "朋友圈素材+1", "享受假期～"
        ];
        extraHint.textContent = hints[Math.floor(Math.random() * hints.length)];

        // 隐藏占位文字
        if (placeholder) placeholder.style.display = 'none';

        // 重新随机纸团展示，增加新鲜感
        renderPaperScraps();
      }

      // 按钮点击事件
      grabBtn.addEventListener('click', performGrab);

      // 监听手机摇一摇（利用 DeviceMotionEvent）
      // 注意：在微信内置浏览器及现代浏览器中，需要用户手势触发后才可请求权限或直接使用。
      // 这里简单实现：检测加速度变化，连续晃动触发抓阄。
      let lastShakeTime = 0;
      const SHAKE_THRESHOLD = 15; // 加速度变化阈值
      if (window.DeviceMotionEvent) {
        window.addEventListener('devicemotion', function(event) {
          const acc = event.accelerationIncludingGravity;
          if (!acc) return;
          const x = acc.x || 0;
          const y = acc.y || 0;
          const z = acc.z || 0;
          const magnitude = Math.sqrt(x*x + y*y + z*z);
          const now = Date.now();
          // 防止短时间内多次触发 (间隔1.5秒)
          if (magnitude > SHAKE_THRESHOLD && (now - lastShakeTime > 1500)) {
            lastShakeTime = now;
            performGrab();
            // 轻振动反馈（如果支持）
            if (window.navigator && window.navigator.vibrate) {
              window.navigator.vibrate(20);
            }
          }
        });
      }

      // 如果是iOS 微信等，可能需要用户首次点击页面才能激活摇一摇监听（已有点击按钮操作，但首次需交互）
      // 在页面添加一个透明遮罩引导点击？不需要，按钮本身即可。
      // 不过摇一摇监听通常在用户第一次手势后生效，此处保留。

      // 初始随机展示一个结果？不展示，保持神秘。
      // 但可以默认显示纸团。
    })();
  </script>
</body>
</html>
