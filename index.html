<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>旅行抓阄 · 去哪儿玩</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #fdf3e7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background-image: radial-gradient(circle at 20% 30%, #ffe8d6 0%, #f8e3cc 80%);
    }
    .container {
      max-width: 420px;
      width: 100%;
      background: rgba(255, 251, 245, 0.9);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: #fff9f2;
      border-radius: 48px;
      box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255,255,255,0.8);
      padding: 30px 24px 38px;
      text-align: center;
      border: 1px solid #fae3cc;
    }
    .subtitle {
      font-size: 15px;
      color: #b4846e;
      letter-spacing: 2px;
      margin-bottom: 6px;
      font-weight: 400;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      color: #5e3e2b;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    h1 span {
      background: #fbe4cf;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 28px;
    }
    .desc {
      color: #9c7a65;
      font-size: 15px;
      margin-bottom: 30px;
      border-bottom: 1px dashed #e7cbb2;
      padding-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .jar-area {
      background: #fae7d6;
      border-radius: 100px;
      padding: 24px 14px 20px;
      margin-bottom: 28px;
      position: relative;
      box-shadow: inset 0 8px 12px rgba(0,0,0,0.05), 0 12px 18px -8px rgba(158, 102, 64, 0.25);
      border: 2px solid #fff3e6;
    }
    .paper-pile {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 80px;
      margin-bottom: 8px;
    }
    .paper-scrap {
      background: #fffef7;
      border-radius: 16px;
      padding: 10px 13px;
      font-size: 14px;
      color: #7b5b47;
      font-weight: 500;
      box-shadow: 2px 4px 10px rgba(0,0,0,0.08), inset 0 -3px 0 rgba(0,0,0,0.02);
      transform: rotate(-1deg);
      transition: all 0.2s;
      border: 1px solid #edd9c6;
      display: inline-block;
    }
    .paper-scrap:nth-child(odd) {
      transform: rotate(2deg);
      background: #fffbf2;
    }
    .result-card {
      background: #fffaf2;
      border-radius: 34px;
      padding: 26px 16px;
      margin: 10px 0 20px;
      border: 2px solid #eaceb0;
      box-shadow: 0 10px 25px rgba(170, 120, 70, 0.2);
      transition: all 0.3s ease;
    }
    .destination {
      font-size: 42px;
      font-weight: 800;
      color: #c45c2c;
      line-height: 1.3;
      letter-spacing: 2px;
      text-shadow: 2px 2px 0 rgba(255,235,200,0.8);
      word-break: break-word;
    }
    .small-hint {
      font-size: 15px;
      color: #b48b6d;
      margin-top: 6px;
    }
    .btn-grab {
      background: #e79b6c;
      border: none;
      border-radius: 60px;
      padding: 18px 32px;
      font-size: 22px;
      font-weight: 700;
      color: white;
      letter-spacing: 3px;
      background: linear-gradient(145deg, #e5975e, #cb7743);
      box-shadow: 0 12px 20px -10px #bc6f43, 0 4px 8px rgba(0,0,0,0.1);
      border: 1px solid #ffccaa;
      transition: all 0.15s ease;
      cursor: pointer;
      width: 80%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-grab:active {
      transform: scale(0.96);
      background: #c36e3b;
      box-shadow: 0 6px 12px rgba(160, 80, 30, 0.4);
    }
    .city-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 20px 0 8px;
      color: #af8b72;
      font-size: 13px;
    }
    .city-badge {
      background: #f7e7da;
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 13px;
      color: #6b4f3c;
    }
    footer {
      margin-top: 22px;
      color: #c8aa8a;
      font-size: 13px;
    }
    @keyframes pop {
      0% { transform: scale(0.9); opacity: 0.6; }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop-effect {
      animation: pop 0.35s ease-out;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="subtitle">✈️ 旅行计划 ✈️</div>
    <h1>
      <span>抓阄</span>去哪儿
    </h1>
    <div class="desc">
      <span>🎋</span> 点击下面，命运帮你选城市 <span>🎋</span>
    </div>

    <!-- 纸团展示区 -->
    <div class="jar-area">
      <div class="paper-pile" id="paperPile">
        <!-- 动态显示几个小纸团 -->
      </div>
      <div style="font-size:13px; color:#b39274; margin-top:4px;">📦 阄罐里有30个城市</div>
    </div>

    <!-- 抓阄结果显示区 -->
    <div id="resultContainer" style="display: none;" class="result-card">
      <div style="font-size:17px; color:#b28056;">🎉 恭喜！抽中 🎉</div>
      <div class="destination" id="cityResult">成都</div>
      <div class="small-hint" id="extraHint">和一起出发吧～</div>
    </div>

    <!-- 初始占位说明 -->
    <div id="placeholderText" style="color:#c7a68b; margin:18px 0; font-size:16px;">
      👆 摇一摇手机或点击按钮
    </div>

    <button class="btn-grab" id="grabBtn">
      <span>🎲</span> 抓 阄 <span>🎲</span>
    </button>

    <div class="city-list">
      <span class="city-badge">北京</span>
      <span class="city-badge">上海</span>
      <span class="city-badge">重庆</span>
      <span class="city-badge">成都</span>
      <span class="city-badge">杭州</span>
      <span class="city-badge">西安</span>
      <span class="city-badge">昆明</span>
      <span class="city-badge">…等30城</span>
    </div>
    <footer>
      🌸 出游季 🌸
    </footer>
  </div>

  <script>
    (function() {
      // ---------- 30个城市列表 ----------
      const cities = [
        "北京", "上海", "天津", "重庆",
        "杭州", "南京", "济南", "合肥", "福州", "南昌",
        "广州", "海口", "南宁",
        "武汉", "长沙", "郑州",
        "石家庄", "太原", "呼和浩特",
        "西安", "兰州", "西宁", "银川", "乌鲁木齐",
        "成都", "昆明", "贵阳", "拉萨",
        "沈阳", "哈尔滨", "长春"
      ];

      // DOM 元素
      const paperPile = document.getElementById('paperPile');
      const resultContainer = document.getElementById('resultContainer');
      const cityResult = document.getElementById('cityResult');
      const extraHint = document.getElementById('extraHint');
      const placeholder = document.getElementById('placeholderText');
      const grabBtn = document.getElementById('grabBtn');

      // ---------- 抓阄防抖 & 摇一摇优化 (避免指关节截屏误触发) ----------
      let lastTriggerTime = 0;           // 上次抓阄触发时间 (毫秒)
      const TRIGGER_COOLDOWN = 1200;      // 抓阄冷却时间 (1.2秒内不重复触发，兼顾按钮和摇一摇)
      
      // 摇一摇专用: 连续晃动检测 (防止单次冲击触发，例如指关节截屏)
      let shakeCount = 0;                // 连续超过阈值的次数
      let lastShakePeakTime = 0;         // 上一次检测到有效震动的时间
      const SHAKE_THRESHOLD = 15;         // 加速度变化阈值 (与原保持一致)
      const SHAKE_SEQUENCE_INTERVAL = 220; // 有效震动间隔需小于220ms才算连续晃动
      const REQUIRED_SHAKE_COUNT = 3;     // 需要连续3次有效震动才触发抓阄 (摇一摇动作)
      
      // 辅助变量: 记录摇一摇监听是否可用 (无额外操作)
      
      // ---------- 工具函数 ----------
      // 随机展示6~8个纸团 (增加趣味)
      function renderPaperScraps() {
        const shuffled = [...cities].sort(() => Math.random() - 0.5);
        const displayCities = shuffled.slice(0, 8);
        paperPile.innerHTML = displayCities.map(city => 
          `<div class="paper-scrap">📜 ${city}</div>`
        ).join('');
      }
      
      // 随机获取一个城市
      function getRandomCity() {
        const randomIndex = Math.floor(Math.random() * cities.length);
        return cities[randomIndex];
      }
      
      // 重置摇一摇的计数状态 (避免残留计数导致意外触发)
      function resetShakeState() {
        shakeCount = 0;
        lastShakePeakTime = 0;
      }
      
      // 核心抓阄逻辑 (动画+结果展示)
      function performGrab(triggerSource = 'manual') {
        const now = Date.now();
        // 冷却判断: 短时间内重复触发会被拦截 (避免手机疯狂摇动或连续点按)
        if (now - lastTriggerTime < TRIGGER_COOLDOWN) {
          // 如果是摇一摇触发且处于冷却期，静默忽略；按钮触发也不做额外提示，仅避免过度反应
          return;
        }
        
        // 更新最后触发时间
        lastTriggerTime = now;
        
        // 轻量纸团抖动动画 (模拟抓取瞬间)
        const scraps = document.querySelectorAll('.paper-scrap');
        scraps.forEach(el => {
          el.style.transform = `rotate(${Math.random() * 12 - 6}deg) scale(0.92)`;
          setTimeout(() => {
            if (el) el.style.transform = '';
          }, 200);
        });
        
        // 随机抽取城市
        const selectedCity = getRandomCity();
        
        // 显示结果卡片
        resultContainer.style.display = 'block';
        cityResult.textContent = selectedCity;
        resultContainer.classList.add('pop-effect');
        setTimeout(() => resultContainer.classList.remove('pop-effect'), 400);
        
        // 随机趣味提示
        const hints = [
          "走起！✈️", "马上订机票吧～", "这个城市超美！", "一起喝下午茶吧", 
          "毕业旅行开始！", "妈妈也疯狂！", "朋友圈素材+1", "享受假期～",
          "美食超多！", "出发吧少年", "好运相伴✨"
        ];
        extraHint.textContent = hints[Math.floor(Math.random() * hints.length)];
        
        // 隐藏初始占位文字
        if (placeholder) placeholder.style.display = 'none';
        
        // 刷新纸团堆，让阄罐看起来“重新填满”
        renderPaperScraps();
        
        // 每次抓阄结束后重置摇一摇的计数，避免因为残留震动在冷却后立即又触发
        resetShakeState();
        
        // 可选: 轻微振动反馈 (仅真实抓阄时触发)
        if (window.navigator && window.navigator.vibrate) {
          window.navigator.vibrate(12);
        }
      }
      
      // ---------- 摇一摇核心逻辑 (连续晃动检测, 屏蔽单次冲击如截屏) ----------
      function initShakeDetection() {
        if (!window.DeviceMotionEvent) {
          console.log("当前设备不支持devicemotion");
          return;
        }
        
        let motionHandler = function(event) {
          const acc = event.accelerationIncludingGravity;
          if (!acc) return;
          
          // 计算加速度矢量和 (强度)
          const x = acc.x || 0;
          const y = acc.y || 0;
          const z = acc.z || 0;
          const magnitude = Math.sqrt(x*x + y*y + z*z);
          
          const now = Date.now();
          
          // 防过热: 如果距离上次抓阄触发还在冷却期，连摇一摇计数也不累积（避免截屏冷却中积累无用计数）
          if (now - lastTriggerTime < TRIGGER_COOLDOWN) {
            return;
          }
          
          // 检测是否超过阈值 (有效震动)
          if (magnitude > SHAKE_THRESHOLD) {
            // 判断与上一次有效震动的时间间隔
            if (lastShakePeakTime === 0) {
              // 第一次震动
              shakeCount = 1;
              lastShakePeakTime = now;
            } else {
              const interval = now - lastShakePeakTime;
              if (interval < SHAKE_SEQUENCE_INTERVAL) {
                // 连续有效震动，增加计数
                shakeCount++;
                lastShakePeakTime = now;
              } else {
                // 间隔太长，重置计数 (视为一次新的晃动序列开始)
                shakeCount = 1;
                lastShakePeakTime = now;
              }
            }
            
            // 调试: 可在控制台观察连续晃动计数 (生产环境不影响)
            // console.log("shakeCount:", shakeCount, " magnitude:", magnitude.toFixed(2));
            
            // 当连续震动次数达到要求时，触发抓阄
            if (shakeCount >= REQUIRED_SHAKE_COUNT) {
              // 先重置计数避免在同一次抖动序列里多次触发
              const triggerNow = Date.now();
              // 再次确认冷却（防止极短时间内重复满足条件）
              if (triggerNow - lastTriggerTime >= TRIGGER_COOLDOWN) {
                performGrab('shake');
                // 触发后重置摇一摇状态，避免同一轮晃动再次触发
                resetShakeState();
              } else {
                // 冷却中，清空计数
                resetShakeState();
              }
            }
          } else {
            // 未超过阈值时不做任何变化，但每隔较长时间没有有效震动，为防止陈旧计数污染，可适当重置
            // 如果超过800ms无新的大于阈值的震动，视为晃动停止，重置计数 (避免摇动后残留计数)
            if (lastShakePeakTime !== 0 && (now - lastShakePeakTime > 800)) {
              resetShakeState();
            }
          }
        };
        
        // 监听设备运动事件
        window.addEventListener('devicemotion', motionHandler);
      }
      
      // ---------- 按钮点击监听 (仅点击按钮触发，无额外干扰) ----------
      function bindButtonEvent() {
        grabBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          // 重置摇一摇计数 (避免按钮点击后紧接着摇一摇在冷却期内累积计数)
          resetShakeState();
          performGrab('button');
        });
      }
      
      // ---------- 页面初始渲染 ----------
      function init() {
        renderPaperScraps();
        bindButtonEvent();
        initShakeDetection();
        // 确保结果区域最初是隐藏的，占位文字显示
        resultContainer.style.display = 'none';
        placeholder.style.display = 'block';
        // 重置各项状态变量
        resetShakeState();
        lastTriggerTime = 0;
      }
      
      init();
    })();
  </script>
</body>
</html>
